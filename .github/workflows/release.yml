name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build game binaries
        run: |
          docker compose run --rm build

      - name: Package release artifacts
        run: |
          cd build
          # Windows zip is already built by build.sh, but re-zip from the directory for consistency
          cd windows && zip -r ../game-win64.zip game-win64/ && cd ..
          # macOS
          cd macos && zip -r ../game-macos.zip game-macos.app/ && cd ..
          # Linux
          cp linux/game-linux-x86_64.AppImage game-linux-x86_64.AppImage
          chmod +x game-linux-x86_64.AppImage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/game.love
            build/game-win64.zip
            build/game-macos.zip
            build/game-linux-x86_64.AppImage
